name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/TauronApp.slnx

      - name: Build
        run: dotnet build src/TauronApp.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/TauronApp.slnx --no-build --configuration Release
